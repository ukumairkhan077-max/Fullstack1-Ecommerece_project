name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          # Set this in your repo's Settings → Secrets and variables →
          # Actions → New repository secret, named exactly VITE_API_URL,
          # with your deployed backend's URL + "/api"
          # (e.g. https://fullstack1-ecommerece-project.vercel.app/api).
          # Without this secret set, the frontend falls back to
          # http://localhost:5000/api (see frontend/src/services/api.js),
          # which only works when you're running the backend locally.
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # GitHub Pages serves static files only — there's no server to fall
      # back to index.html for client-side routes like /collection/men on a
      # hard refresh. Copying index.html to 404.html makes GitHub Pages
      # serve the app for any unknown path, letting React Router take over.
      - name: Add SPA fallback (404.html)
        working-directory: frontend
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4